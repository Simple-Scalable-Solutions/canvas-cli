version: 2
project_name: canvas-pp-cli
changelog:
  disable: true
builds:
  - id: canvas-pp-cli
    main: ./cmd/canvas-pp-cli
    binary: canvas-pp-cli
    env:
      - CGO_ENABLED=0
    ldflags:
      - -s -w -X canvas-pp-cli/internal/cli.version={{ .Version }}
    targets:
      - darwin_amd64
      - darwin_arm64
      - linux_amd64
      - linux_arm64
      - windows_amd64
      - windows_arm64
  - id: canvas-pp-mcp
    main: ./cmd/canvas-pp-mcp
    binary: canvas-pp-mcp
    env:
      - CGO_ENABLED=0
    ldflags:
      - -s -w
    targets:
      - darwin_amd64
      - darwin_arm64
      - linux_amd64
      - linux_arm64
      - windows_amd64
      - windows_arm64
archives:
  - formats: [tar.gz]
    name_template: "{{ .ProjectName }}_{{ .Version }}_{{ .Os }}_{{ .Arch }}"
    format_overrides:
      - goos: windows
        formats: [zip]
checksum:
  name_template: checksums.txt
brews:
  - name: canvas-pp-cli
    repository:
      owner: simple-scalable-solutions
      name: homebrew-tap
    homepage: "https://github.com/simple-scalable-solutions/canvas-pp-cli"
    description: "Canvas LMS REST API - Generated from YARD documentation"
    install: |
      bin.install "canvas-pp-cli"
      bin.install "canvas-pp-mcp"
