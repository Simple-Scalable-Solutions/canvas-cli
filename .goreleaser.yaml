version: 2
project_name: canvas-cli
changelog:
  disable: true
builds:
  - id: canvas-cli
    main: ./cmd/canvas-cli
    binary: canvas-cli
    env:
      - CGO_ENABLED=0
    ldflags:
      - -s -w -X canvas-cli/internal/cli.version={{ .Version }}
    targets:
      - darwin_amd64
      - darwin_arm64
      - linux_amd64
      - linux_arm64
      - windows_amd64
      - windows_arm64
  - id: canvas-mcp
    main: ./cmd/canvas-mcp
    binary: canvas-mcp
    env:
      - CGO_ENABLED=0
    ldflags:
      - -s -w
    targets:
      - darwin_amd64
      - darwin_arm64
      - linux_amd64
      - linux_arm64
      - windows_amd64
      - windows_arm64
archives:
  - builds: [canvas-cli, canvas-mcp]
    formats: [tar.gz]
    name_template: "{{ .ProjectName }}_{{ .Version }}_{{ .Os }}_{{ .Arch }}"
    format_overrides:
      - goos: windows
        formats: [zip]
checksum:
  name_template: checksums.txt
